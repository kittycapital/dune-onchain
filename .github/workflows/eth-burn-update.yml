# .github/workflows/eth-burn-update.yml
# ETH Burn Dashboard — Daily Data Update
# Dune API에서 ETH 소각 데이터를 가져와 CSV/JS로 저장

name: ETH Burn Data Update

on:
  schedule:
    # 매일 UTC 06:00 (KST 15:00) 실행
    - cron: '0 6 * * *'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests dune-client

      - name: Fetch ETH burn data from Dune
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
        run: python fetch_eth_burn.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 ETH burn data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
